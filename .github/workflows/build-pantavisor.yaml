name: 'Build Pantavisor'

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      configs:
        required: true
        type: string

jobs:
  build-kas:
    runs-on: ["self-hosted"]
    container:
      image: ghcr.io/pantacor/kas/kas:next-v7
      volumes:
        - shared:/shared
      options: --user root

    steps:

      - name: checkout pantavisor repo
        uses: actions/checkout@v5

      - name: checkout meta-pantavisor
        uses: actions/checkout@v5
        with:
          repository: pantavisor/meta-pantavisor
          path: meta-pantavisor

      - name: Setup shared directories and permissions
        run: |
          mkdir -p /shared/sstate
          chmod -R 777 /shared/sstate
          mkdir -p /shared/dldir
          chmod -R 777 /shared/dldir
          chown -R builder:builder  $RUNNER_WORKSPACE
          chown -R builder:builder /__w

      - name: test
        run: |
           ls -la
           ls ${{ inputs.configs }}
           ls -la $GITHUB_WORKSPACE
           ls -la $GITHUB_WORKSPACE/meta-pantavisor
           ls -la $GITHUB_WORKSPACE/pantavisor

