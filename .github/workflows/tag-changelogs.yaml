name: "ontag: generate changelog and release notes"

# Fires when a release tag lands in this repo. Tags are pushed here by
# meta-pantavisor's tag-sync workflow (sync-pantavisor-tag.sh), which creates
# the ref via the GitHub API using a PAT (PANTAVISOR_TAG_SYNC_TOKEN) — refs
# created with a PAT DO trigger workflows, so this push event fires normally.
#
# By the time it runs the tag already exists, so make-changelog.sh runs in
# historical mode: it renders the section for the tag, then:
#   1. Opens a PR back to master with the updated CHANGELOG/CHANGELOG-<MAJOR>.md
#   2. Creates (or updates) the GitHub Release for the tag with the section
#      as its body.
#
# Unlike meta-pantavisor's changelog (Downloads + multi-component SRCREV diff),
# this one only renders categorized changes plus a version line, since
# pantavisor is a single source repo.
#
# Manual re-run via workflow_dispatch is supported (e.g. to backfill or after a
# tag re-push).

on:
  push:
    tags:
      - '0*'
      - '*-rc*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to generate changelog for (e.g. 028-rc8)"
        required: true

jobs:
  changelog:
    name: "changelog (${{ github.event.inputs.tag || github.ref_name }})"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Validate tag and derive major
        run: |
          if [[ ! "$TAG" =~ ^0[0-9]+(-rc[0-9]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match release pattern (0NN or 0NN-rcN)."
            exit 1
          fi
          MAJOR="${TAG%%-*}"
          echo "MAJOR=$MAJOR" >> "$GITHUB_ENV"
          echo "Tag:   $TAG"
          echo "Major: $MAJOR"

      - name: Checkout master with full history
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PANTAVISOR_TAG_SYNC_TOKEN }}

      - name: Generate changelog file (historical mode)
        run: |
          # The tag exists by the time this fires, so make-changelog.sh runs in
          # historical mode: writes CHANGELOG/CHANGELOG-<MAJOR>.md but does not
          # auto-commit (the PR action handles the commit).
          ./.github/scripts/make-changelog.sh "$TAG"

      - name: Render release-notes section to a file
        run: |
          ./.github/scripts/make-changelog.sh --stdout "$TAG" > /tmp/release-notes.md
          echo "----- release-notes.md (head) -----"
          head -20 /tmp/release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating notes."
            # --draft=false re-publishes a release that GitHub flipped back
            # to draft after a tag re-push
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft=false \
              --notes-file /tmp/release-notes.md
          else
            echo "Release $TAG does not exist — creating with notes."
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md
          fi

      - name: Open PR with updated CHANGELOG
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PANTAVISOR_TAG_SYNC_TOKEN }}
          base: master
          branch: changelog/${{ env.TAG }}
          delete-branch: true
          add-paths: CHANGELOG/CHANGELOG-${{ env.MAJOR }}.md
          commit-message: "changelogs(${{ env.TAG }}): autoadd changelog"
          title: "changelogs(${{ env.TAG }}): autoadd changelog"
          body: |
            Auto-generated CHANGELOG section for `${{ env.TAG }}`.

            Generated by `.github/workflows/tag-changelogs.yaml` after the tag
            was synced from meta-pantavisor. Contains a version line and the
            categorized changes since the previous tag in the stream.

            Release page: https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG }}
