# i.MX8M Nano M7 — RPMsg transport via OpenAMP over remoteproc
CONFIG_OPENAMP=y
CONFIG_OPENAMP_MASTER=n
CONFIG_IPM=y
CONFIG_IPM_IMX=y
CONFIG_OPENAMP_RSC_TABLE=y
CONFIG_OPENAMP_RSC_TABLE_NUM_RPMSG_BUFF=32

# MU register mapping: 4 bytes per register = 4 independent channels.
# Linux DTB uses mbox index 1, so M7 must monitor RR[1].
# With SIZE_16 (default), only RR[3] is monitored — misses the kick.
CONFIG_IPM_IMX_MAX_DATA_SIZE_16=n
CONFIG_IPM_IMX_MAX_DATA_SIZE_4=y
