# Override for native_sim: use UART transport instead of RPMsg
CONFIG_PANTAVISOR_TRANSPORT_RPMSG=n
CONFIG_PANTAVISOR_TRANSPORT_UART=y
CONFIG_OPENAMP=n
CONFIG_SERIAL=y
CONFIG_UART_NATIVE_POSIX=y
# UART0 = shell/console (default PTY or stdin/stdout)
# UART1 = PVCM protocol (own PTY, bidirectional)
CONFIG_UART_NATIVE_POSIX_PORT_1_ENABLE=y
CONFIG_PANTAVISOR_UART_DEVICE="uart_1"
# Slow simulated time to match wall clock for UART I/O
CONFIG_NATIVE_SIM_SLOWDOWN_TO_REAL_TIME=y
