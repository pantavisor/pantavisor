CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_IPM=y
# Heap: SDK adds 32KB via HEAP_MEM_POOL_ADD_SIZE_PANTAVISOR.
# Explicit minimum needed for FILE_SYSTEM_SHELL dependency check.
CONFIG_HEAP_MEM_POOL_SIZE=1024
CONFIG_OPENAMP=y
CONFIG_OPENAMP_RSC_TABLE_NUM_RPMSG_BUFF=32
CONFIG_OPENAMP_RSC_TABLE=y
CONFIG_OPENAMP_MASTER=n
CONFIG_SHELL=y

# Pantavisor MCU SDK
CONFIG_PANTAVISOR=y
CONFIG_PANTAVISOR_TRANSPORT_RPMSG=y
CONFIG_PANTAVISOR_LOG_BACKEND=y
CONFIG_PANTAVISOR_SHELL=y
CONFIG_PANTAVISOR_BRIDGE=y
CONFIG_PANTAVISOR_DBUS=y
CONFIG_PANTAVISOR_FS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_SHELL=y
CONFIG_FILE_SYSTEM_MAX_TYPES=4
